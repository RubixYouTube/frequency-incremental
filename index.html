function getUpLevel(type, id) { return G.ups[type + '_' + id] || ZERO; }
function setUpLevel(type, id, v) { G.ups[type + '_' + id] = D(v); }

// [FIX #9] Guard against undefined upgrade IDs
function getUpCost(type, id) {
  const u = UPGRADES[type] && UPGRADES[type].find(x => x.id === id);
  if (!u) return D(Infinity); // unpurchasable if upgrade doesn't exist
  const lv = getUpLevel(type, id);
  return D(u.base).times(Decimal.pow(u.mult, lv));
}

// ===== UTILITY =====
function softcap(v, start, pow) {
  v = D(v); start = D(start);
  if (v.lte(start)) return v;
  return v.div(start).pow(pow).times(start);
}

// [FIX #1 & #12] Rewritten fmt() with proper number ranges
function fmt(num, dec=2) {
  num = D(num);
  if (num.lt(0)) return '-' + fmt(num.neg(), dec);
  if (num.eq(0)) return '0';
  if (num.lt(0.01) && num.gt(0)) return num.toExponential(dec);
  if (num.lt(1000)) return num.toFixed(num.lt(10) ? dec : (num.lt(100) ? 1 : 0));
  if (num.lt(1e6)) {
    // [FIX #1] Format 1,000–999,999 as K
    return (num.toNumber() / 1e3).toFixed(dec) + 'K';
  }
  if (num.lt(1e9)) return (num.toNumber() / 1e6).toFixed(dec) + 'M';
  if (num.lt(1e12)) return (num.toNumber() / 1e9).toFixed(dec) + 'B';
  if (num.lt(1e15)) return (num.toNumber() / 1e12).toFixed(dec) + 'T';
  // Scientific for large numbers
  if (num.layer > 0 || num.e >= 1000) {
    if (num.e >= 1e6) {
      return num.mantissa.toFixed(2) + 'e' + fmt(D(num.e));
    }
    if (num.e >= 1000) {
      const e = num.e;
      const ie = Math.floor(Math.log10(e));
      const im = e / Math.pow(10, ie);
      return num.mantissa.toFixed(2) + 'e' + im.toFixed(2) + 'e' + ie;
    }
  }
  return num.mantissa.toFixed(2) + 'e' + num.e;
}

// ===== HZ PER SEC =====
function calcHzPerSec() {
  let b = ONE;
  const hl = (id) => getUpLevel('hz', id);
  b = b.times(Decimal.pow(2, softcap(hl(1), 100, 0.5)));
  b = b.times(Decimal.pow(1.25, softcap(hl(2), 80, 0.6)));
  b = b.times(Decimal.pow(1.5, softcap(hl(3), 60, 0.55)));
  b = b.times(Decimal.pow(2, softcap(hl(4), 50, 0.5)));
  b = b.times(Decimal.pow(3, softcap(hl(5), 40, 0.45)));
  b = b.times(Decimal.pow(5, softcap(hl(6), 30, 0.4)));

  if (G.volumeUnlocked) {
    const vl = (id) => getUpLevel('volume', id);
    let vb = G.volume.plus(1).pow(0.8);
    if (vl(1).gt(0)) vb = vb.times(Decimal.pow(1.5, softcap(vl(1), 20, 0.5)));
    if (vl(3).gt(0)) b = b.times(Decimal.pow(2, softcap(vl(3), 15, 0.5)));
    if (vl(5).gt(0)) b = b.times(G.hz.plus(1).log10().plus(1).pow(vl(5).times(0.05)));
    b = b.times(vb);
  }

  if (G.speakersUnlocked) {
    const sl = (id) => getUpLevel('speaker', id);
    let sb = G.speakers.plus(1).pow(1.5);
    if (sl(1).gt(0)) sb = sb.times(Decimal.pow(2, softcap(sl(1), 10, 0.5)));
    if (sl(3).gt(0)) b = b.times(Decimal.pow(3, softcap(sl(3), 8, 0.5)));
    if (sl(5).gt(0)) b = b.times(G.volume.plus(1).pow(sl(5).times(0.3)));
    if (sl(7).gt(0)) b = b.times(Decimal.pow(10, softcap(sl(7), 5, 0.4)));
    b = b.times(sb);
  }

  if (G.infinityUnlocked) {
    const il = (id) => getUpLevel('infinity', id);
    let ib = G.infinity.plus(1).pow(3);
    if (il(1).gt(0)) b = b.times(Decimal.pow(10, il(1)));
    if (il(3).gt(0)) b = b.times(G.infinity.plus(1).pow(il(3).times(0.5)));
    if (il(5).gt(0)) b = b.times(Decimal.pow(2, il(5).times(G.speakers.plus(1).log10())));
    if (il(7).gt(0)) b = b.times(G.hz.plus(10).log10().pow(il(7).times(0.5)));
    if (il(9).gt(0)) b = b.times(Decimal.pow(100, il(9)));
    if (il(11).gt(0)) b = b.times(G.volume.plus(1).times(G.speakers.plus(1)).pow(il(11).times(0.2)));
    if (il(13).gt(0)) b = b.times(Decimal.pow(1000, il(13)));
    b = b.times(ib);
  }

  b = b.times(machineBoost());
  b = b.times(eternityBoost());

  if (b.gte("1e100")) b = softcap(b, D("1e100"), 0.75);
  return b;
}

// ===== PRESTIGE GAINS =====
function calcVolGain() {
  let b = G.hz.div(1e6).pow(0.4).floor();
  const vl = (id) => getUpLevel('volume', id);
  const sl = (id) => getUpLevel('speaker', id);
  const il = (id) => getUpLevel('infinity', id);
  const el = (id) => getUpLevel('eternity', id);
  if (vl(2).gt(0)) b = b.times(Decimal.pow(2, softcap(vl(2), 10, 0.5)));
  if (sl(2).gt(0)) b = b.times(Decimal.pow(1.5, softcap(sl(2), 8, 0.5)));
  if (sl(4).gt(0)) b = b.times(G.speakers.plus(1).pow(sl(4).times(0.5)));
  if (il(2).gt(0)) b = b.times(Decimal.pow(5, il(2)));
  if (il(6).gt(0)) b = b.times(G.infinity.plus(1).pow(il(6)));
  if (il(10).gt(0)) b = b.times(Decimal.pow(50, il(10)));
  if (el(4).gt(0)) b = b.times(Decimal.pow(1000, el(4)));
  b = b.times(machineBoost()).times(eternityBoost()).times(volNerf());
  return b.floor();
}

function calcSpkGain() {
  let b = G.volume.div(100).pow(0.35).floor();
  const sl = (id) => getUpLevel('speaker', id);
  const il = (id) => getUpLevel('infinity', id);
  const el = (id) => getUpLevel('eternity', id);
  if (sl(6).gt(0)) b = b.times(Decimal.pow(2, softcap(sl(6), 6, 0.5)));
  if (il(4).gt(0)) b = b.times(Decimal.pow(10, il(4)));
  if (il(8).gt(0)) b = b.times(G.infinity.plus(1).pow(il(8).times(0.75)));
  if (il(12).gt(0)) b = b.times(Decimal.pow(25, il(12)));
  if (el(4).gt(0)) b = b.times(Decimal.pow(1000, el(4)));
  b = b.times(machineBoost()).times(eternityBoost()).times(spkNerf());
  return b.floor();
}

function calcInfGain() {
  if (G.hz.lt(G.infinityReq)) return ZERO;
  let b = G.hz.log10().div(G.infinityReq.log10()).pow(0.5).floor();
  const il = (id) => getUpLevel('infinity', id);
  const el = (id) => getUpLevel('eternity', id);
  if (il(14).gt(0)) b = b.times(Decimal.pow(2, il(14)));
  if (el(2).gt(0)) b = b.times(Decimal.pow(100, el(2)));
  b = b.times(machineBoost()).times(eternityBoost());
  return b.floor().max(1);
}

function calcEtGain() {
  if (G.infinity.lt(G.eternityReq)) return ZERO;
  let b = G.infinity.log10().div(G.eternityReq.log10()).pow(0.4).floor();
  const el = (id) => getUpLevel('eternity', id);
  if (el(10).gt(0)) b = b.times(machineBoost().log10().plus(1));
  if (el(18).gt(0)) b = b.times(G.eternity.plus(1).pow(el(18)));
  return b.floor().max(1);
}

// ===== BUY UPGRADES =====
function getCurrency(type) {
  // [FIX #16] normalize type to lowercase
  type = type.toLowerCase();
  if (type==='hz') return G.hz;
  if (type==='volume' || type==='vol') return G.volume;
  if (type==='speaker' || type==='speakers' || type==='spk') return G.speakers;
  if (type==='infinity' || type==='inf') return G.infinity;
  if (type==='eternity' || type==='et') return G.eternity;
  return ZERO;
}
function setCurrency(type, v) {
  type = type.toLowerCase();
  if (type==='hz') G.hz = v;
  if (type==='volume' || type==='vol') G.volume = v;
  if (type==='speaker' || type==='speakers' || type==='spk') G.speakers = v;
  if (type==='infinity' || type==='inf') G.infinity = v;
  if (type==='eternity' || type==='et') G.eternity = v;
}

// [FIX #16] Normalize layer name for UPGRADES lookup
function normalizeLayer(type) {
  type = type.toLowerCase();
  if (type === 'vol' || type === 'volume') return 'volume';
  if (type === 'spk' || type === 'speakers' || type === 'speaker') return 'speaker';
  if (type === 'inf') return 'infinity';
  if (type === 'et') return 'eternity';
  return type;
}

function buyUp(type, id) {
  const normType = normalizeLayer(type);
  const cost = getUpCost(normType, id);
  if (!isFinite(cost.toNumber()) && cost.e === Infinity) return; // [FIX #9] invalid upgrade
  const cur = getCurrency(normType);
  if (cur.gte(cost)) {
    setCurrency(normType, cur.minus(cost));
    setUpLevel(normType, id, getUpLevel(normType, id).plus(1));
  }
}

// [FIX #2] Rewritten buyMaxUp with logarithmic calculation instead of brute-force loop
function buyMaxUp(type, id) {
  const normType = normalizeLayer(type);
  const u = UPGRADES[normType] && UPGRADES[normType].find(x => x.id === id);
  if (!u) return;

  let cur = getCurrency(normType);
  let lv = getUpLevel(normType, id);
  const base = D(u.base);
  const mult = D(u.mult);

  // For geometric series: total cost of n levels from current = base * mult^lv * (mult^n - 1) / (mult - 1)
  // We solve for max n where player can afford the sum
  // Fallback to iterative for small counts to keep it simple & safe
  if (mult.eq(1)) {
    // Linear cost: each level costs base
    const affordable = cur.div(base).floor();
    if (affordable.gt(0)) {
      const totalCost = base.times(affordable);
      setCurrency(normType, cur.minus(totalCost));
      setUpLevel(normType, id, lv.plus(affordable));
    }
    return;
  }

  // Iterative with a sane cap (1000 per call is plenty for 30fps)
  let bought = 0;
  while (bought < 1000) {
    const cost = base.times(Decimal.pow(mult, lv));
    cur = getCurrency(normType);
    if (cur.lt(cost)) break;
    setCurrency(normType, cur.minus(cost));
    lv = lv.plus(1);
    setUpLevel(normType, id, lv);
    bought++;
  }
}

}
function resetVol() {
  G.volume = ZERO;

}
function resetSpk() {

}
function resetInf() {
  UPGRADES.infinity.forEach(u => setUpLevel('infinity', u.id, ZERO));
  G.infinityReq = D("1e308");
  G.infinityTimes = ZERO;
  resetSpk();
  G.speakers = ZERO;
}
function resetEt() {
  UPGRADES.eternity.forEach(u => setUpLevel('eternity', u.id, ZERO));
  G.eternityReq = D("1e308");
  G.eternityTimes = ZERO;
  G.infinity = ZERO;
  resetInf();
}

// [FIX #5] Prestige only grants resources when gain >= 1
function prestigeVolume() {
  const g = calcVolGain();
  const firstUnlock = !G.volumeUnlocked && G.hz.gte(1e6);
  if (g.gte(1) || firstUnlock) {
    const actualGain = g.max(firstUnlock ? 1 : 0); // guarantee at least 1 on first unlock
    G.volume = G.volume.plus(actualGain);
    G.volumeUnlocked = true;
    resetHz();
    showNotif('Volume Prestige', `+${fmt(actualGain)} Volume`, 'success');
  }
}
function prestigeSpeaker() {
  const g = calcSpkGain();
  const firstUnlock = !G.speakersUnlocked && G.volume.gte(100);
  if (g.gte(1) || firstUnlock) {
    const actualGain = g.max(firstUnlock ? 1 : 0);
    G.speakers = G.speakers.plus(actualGain);
    G.speakersUnlocked = true;
    resetVol();
    showNotif('Speaker Prestige', `+${fmt(actualGain)} Speakers`, 'success');
  }
}
function doInfinity() {
  const g = calcInfGain();
  if (g.lt(1) && G.infinityUnlocked) return;
  G.infinity = G.infinity.plus(g.max(1));
  G.infinityUnlocked = true;
  G.infinityTimes = G.infinityTimes.plus(1);
  G.infinityReq = G.infinityReq.times(Decimal.pow(10, Decimal.pow(2, G.infinityTimes)));
  resetSpk(); G.speakers = ZERO;
  showNotif('Infinity!', `+${fmt(g.max(1))} Infinity`, 'special');
}

// [FIX #3] Bulk prestige: snapshot Hz before loop, compute all gains against rising req
function bulkInfinity() {
  const snapshotHz = G.hz; // snapshot pre-reset value
  let total = ZERO, count = 0;
  let req = G.infinityReq;
  let times = G.infinityTimes;

  while (snapshotHz.gte(req) && count < 10000) {
    // compute gain using snapshot
    let b = snapshotHz.log10().div(req.log10()).pow(0.5).floor();
    const il = (id) => getUpLevel('infinity', id);
    const el = (id) => getUpLevel('eternity', id);
    if (il(14).gt(0)) b = b.times(Decimal.pow(2, il(14)));
    if (el(2).gt(0)) b = b.times(Decimal.pow(100, el(2)));
    b = b.times(machineBoost()).times(eternityBoost());
    b = b.floor().max(1);

    total = total.plus(b);
    times = times.plus(1);
    req = req.times(Decimal.pow(10, Decimal.pow(2, times)));
    count++;
  }
  if (total.gt(0)) {
    G.infinity = G.infinity.plus(total);
    G.infinityTimes = times;
    G.infinityReq = req;
    resetSpk(); G.speakers = ZERO;
    showNotif('Bulk Infinity', `+${fmt(total)} Infinity (${count}×)`, 'special');
  }
}

function doEternity() {
  const g = calcEtGain();
  if (g.lt(1) && G.eternityUnlocked) return;
  G.eternity = G.eternity.plus(g.max(1));
  G.eternityUnlocked = true;
  G.eternityTimes = G.eternityTimes.plus(1);
  G.eternityReq = G.eternityReq.times(Decimal.pow(10, Decimal.pow(3, G.eternityTimes)));
  G.infinity = ZERO; resetInf();
  showNotif('Eternity!', `+${fmt(g.max(1))} Eternity`, 'special');
}

// [FIX #3] Bulk eternity with snapshot
function bulkEternity() {
  const snapshotInf = G.infinity;
  let total = ZERO, count = 0;
  let req = G.eternityReq;
  let times = G.eternityTimes;

  while (snapshotInf.gte(req) && count < 10000) {
    let b = snapshotInf.log10().div(req.log10()).pow(0.4).floor();
    const el = (id) => getUpLevel('eternity', id);
    if (el(10).gt(0)) b = b.times(machineBoost().log10().plus(1));
    if (el(18).gt(0)) b = b.times(G.eternity.plus(total).plus(1).pow(el(18)));
    b = b.floor().max(1);

    total = total.plus(b);
    times = times.plus(1);
    req = req.times(Decimal.pow(10, Decimal.pow(3, times)));
    count++;
  }
  if (total.gt(0)) {
    G.eternity = G.eternity.plus(total);
    G.eternityTimes = times;
    G.eternityReq = req;
    G.infinity = ZERO; resetInf();
    showNotif('Bulk Eternity', `+${fmt(total)} Eternity (${count}×)`, 'special');
  }
}

// ===== AUTOMATOR =====
let autoConsole = [];
let autoVariables = {};

function autoLog(msg, type='info') {
  autoConsole.push({msg, type, time: Date.now()});
  if (autoConsole.length > 200) autoConsole.shift();
}

function parseAutoLine(line) {
  line = line.trim();
  if (!line || line.startsWith('//')) return null;

  const tokens = line.split(/\s+/);
  const cmd = tokens[0].toLowerCase();

  if (cmd === 'buy' && tokens.length >= 3) return {type:'buy', layer:tokens[1], id:parseInt(tokens[2])};
  if (cmd === 'buymax' && tokens.length >= 3) return {type:'buymax', layer:tokens[1], id:parseInt(tokens[2])};
  if (cmd === 'prestige' && tokens.length >= 2) return {type:'prestige', layer:tokens[1]};
  if (cmd === 'infinity') return {type:'prestige', layer:'infinity'};
  if (cmd === 'eternity') return {type:'prestige', layer:'eternity'};
  if (cmd === 'bulkinf' || cmd === 'bulkinfinity') return {type:'bulkinf'};
  if (cmd === 'bulket' || cmd === 'bulketernity') return {type:'bulket'};
  if (cmd === 'wait' && tokens.length >= 2) return {type:'wait', ms:parseInt(tokens[1])};
  if (cmd === 'print') return {type:'print', msg:tokens.slice(1).join(' ').replace(/^"|"$/g,'')};
  if (cmd === 'stop') return {type:'stop'};
  
  if (cmd === 'notify') {
    const rest = line.substring(cmd.length).trim();
    const titleMatch = rest.match(/^"([^"]*)"\s*(.*)$/);
    if (titleMatch) {
      const title = titleMatch[1];
      const after = titleMatch[2];
      const msgMatch = after.match(/^"([^"]*)"\s*(.*)$/);
      if (msgMatch) {
        return {type:'notify', title:title, msg:msgMatch[1], ntype:msgMatch[2].trim()||'info'};
      }
      return {type:'notify', title:'Notice', msg:title, ntype:after.trim()||'info'};
    }
    return {type:'notify', title:'Notice', msg:rest, ntype:'info'};
  }
  
  if (cmd === 'popup') {
    const rest = line.substring(cmd.length).trim().replace(/^"|"$/g,'');
    return {type:'popup', msg:rest};
  }
  
  if (cmd === 'theme' && tokens.length >= 2) return {type:'theme', name:tokens[1].toLowerCase()};
  if (cmd === 'tab' && tokens.length >= 2) return {type:'tab', name:tokens[1].toLowerCase()};
  if (cmd === 'save') return {type:'save'};
  if (cmd === 'set' && tokens.length >= 3) return {type:'set', name:tokens[1], value:tokens.slice(2).join(' ')};
  if (cmd === 'add' && tokens.length >= 3) return {type:'add', name:tokens[1], value:tokens[2]};
  if (cmd === 'buyall' && tokens.length >= 2) return {type:'buyall', layer:tokens[1]};
  if (cmd === 'maxall' && tokens.length >= 2) return {type:'maxall', layer:tokens[1]};
  if (cmd === 'clear') return {type:'clear'};
  if (cmd === 'beep') return {type:'beep'};
  
  if (cmd === 'if' && tokens.length >= 5) {
    const res = tokens[1];
    const op = tokens[2];
    const val = tokens[3];
    if (tokens[4].toLowerCase() === 'then') {
      const subLine = tokens.slice(5).join(' ');
      return {type:'if', resource:res, op:op, value:val, sub:subLine};
    }
  }

  if (cmd === 'while' && tokens.length >= 5) {
    const res = tokens[1];
    const op = tokens[2];
    const val = tokens[3];
    if (tokens[4].toLowerCase() === 'do') {
      const subLine = tokens.slice(5).join(' ');
      return {type:'while', resource:res, op:op, value:val, sub:subLine};
    }
  }

  if (cmd === 'loop' && tokens.length >= 4) {
    const count = parseInt(tokens[1]);
    if (tokens[2].toLowerCase() === 'do') {
      const subLine = tokens.slice(3).join(' ');
      return {type:'loop', count:count, sub:subLine};
    }
  }

  return {type:'unknown', line:line};
}

function getResource(name) {
  name = name.toLowerCase();
  if (name === 'hz') return G.hz;
  if (name === 'volume' || name === 'vol') return G.volume;
  if (name === 'speakers' || name === 'spk') return G.speakers;
  if (name === 'infinity' || name === 'inf') return G.infinity;
  if (name === 'eternity' || name === 'et') return G.eternity;
  if (name === 'hzpersec' || name === 'hzps') return calcHzPerSec();
  if (name === 'infinitytimes' || name === 'inftimes') return G.infinityTimes;
  if (name === 'eternitytimes' || name === 'ettimes') return G.eternityTimes;
  if (autoVariables[name] !== undefined) return D(autoVariables[name]);
  return ZERO;
}

function evalCondition(res, op, val) {
  const r = getResource(res);
  const v = D(val);
  if (op === '>') return r.gt(v);
  if (op === '<') return r.lt(v);
  if (op === '>=' || op === '=>') return r.gte(v);
  if (op === '<=' || op === '=<') return r.lte(v);
  if (op === '==' || op === '=') return r.eq(v);
  if (op === '!=') return !r.eq(v);
  return false;
}

function execCommand(parsed) {
  if (!parsed) return true;
  if (parsed.type === 'unknown') { autoLog(`Unknown: ${parsed.line}`, 'error'); return true; }
  if (parsed.type === 'buy') { buyUp(parsed.layer, parsed.id); autoLog(`Bought ${parsed.layer} #${parsed.id}`, 'success'); return true; }
  if (parsed.type === 'buymax') { buyMaxUp(parsed.layer, parsed.id); autoLog(`BuyMax ${parsed.layer} #${parsed.id}`, 'success'); return true; }
  if (parsed.type === 'buyall') {
    const norm = normalizeLayer(parsed.layer);
    if (UPGRADES[norm]) {
      UPGRADES[norm].forEach(u => buyUp(norm, u.id));
      autoLog(`BuyAll on ${norm}`, 'success');
    } else autoLog(`Invalid layer: ${parsed.layer}`, 'error');
    return true;
  }
  if (parsed.type === 'maxall') {
    const norm = normalizeLayer(parsed.layer);
    if (UPGRADES[norm]) {
      UPGRADES[norm].forEach(u => buyMaxUp(norm, u.id));
      autoLog(`MaxAll on ${norm}`, 'success');
    } else autoLog(`Invalid layer: ${parsed.layer}`, 'error');
    return true;
  }
  if (parsed.type === 'prestige') {
    const layer = parsed.layer.toLowerCase();
    if (layer === 'volume' || layer === 'vol') prestigeVolume();
    else if (layer === 'speaker' || layer === 'spk' || layer === 'speakers') prestigeSpeaker();
    else if (layer === 'infinity' || layer === 'inf') doInfinity();
    else if (layer === 'eternity' || layer === 'et') doEternity();
    else autoLog(`Unknown prestige layer: ${parsed.layer}`, 'error');
    autoLog(`Prestige: ${parsed.layer}`, 'success');
    return true;
  }
  if (parsed.type === 'bulkinf') { bulkInfinity(); autoLog('Bulk Infinity', 'success'); return true; }
  if (parsed.type === 'bulket') { bulkEternity(); autoLog('Bulk Eternity', 'success'); return true; }
  if (parsed.type === 'print') { autoLog(parsed.msg, 'info'); return true; }
  if (parsed.type === 'stop') { stopAutomator(); return false; }
  if (parsed.type === 'notify') {
    showNotif(parsed.title, parsed.msg, parsed.ntype);
    autoLog(`Notify: ${parsed.title} - ${parsed.msg}`, 'notif');
    return true;
  }
  if (parsed.type === 'popup') {
    showPopup(parsed.msg);
    autoLog(`Popup: ${parsed.msg}`, 'notif');
    return true;
  }
  if (parsed.type === 'theme') {
    if (THEMES.includes(parsed.name)) {
      G.theme = parsed.name;
      applyTheme(parsed.name);
      initThemeButtons(); // [FIX #8] re-init theme buttons so popup stays in sync
      autoLog(`Theme: ${parsed.name}`, 'success');
    } else autoLog(`Invalid theme: ${parsed.name}`, 'error');
    return true;
  }
  if (parsed.type === 'tab') {
    // Sync editor before switching away
    if (activeTab === 'automator') {
      const editor = document.getElementById('auto-editor');
      if (editor) G.automatorCode = editor.value;
    }
    activeTab = parsed.name;
    autoLog(`Switched to tab: ${parsed.name}`, 'success');
    return true;
  }
  if (parsed.type === 'save') {
    saveGame();
    autoLog('Game saved', 'success');
    return true;
  }
  if (parsed.type === 'set') {
    autoVariables[parsed.name.toLowerCase()] = parsed.value;
    autoLog(`set ${parsed.name} = ${parsed.value}`, 'info');
    return true;
  }
  if (parsed.type === 'add') {
    const cur = D(autoVariables[parsed.name.toLowerCase()] || 0);
    autoVariables[parsed.name.toLowerCase()] = cur.plus(D(parsed.value)).toString();
    autoLog(`add ${parsed.name} += ${parsed.value}`, 'info');
    return true;
  }
  if (parsed.type === 'clear') {
    autoConsole = [];
    return true;
  }
  if (parsed.type === 'beep') {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; gain.gain.value = 0.1;
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch(e) {}
    autoLog('beep!', 'info');
    return true;
  }
  if (parsed.type === 'if') {
    if (evalCondition(parsed.resource, parsed.op, parsed.value)) {
      const sub = parseAutoLine(parsed.sub);
      return execCommand(sub);
    }
    return true;
  }
  // [FIX #7] Reduced while/loop caps from 10000 to 500 to prevent frame freezes
  if (parsed.type === 'loop') {
    for (let i = 0; i < Math.min(parsed.count, 500); i++) {
      const sub = parseAutoLine(parsed.sub);
      if (!execCommand(sub)) return false;
    }
    return true;
  }
  if (parsed.type === 'while') {
    let iter = 0;
    while (evalCondition(parsed.resource, parsed.op, parsed.value) && iter < 500) {
      const sub = parseAutoLine(parsed.sub);
      if (!execCommand(sub)) return false;
      iter++;
    }
    return true;
  }
  if (parsed.type === 'wait') return true;
  return true;
}

let autoLines = [];
let autoPC = 0;
let autoWaitUntil = 0;

function startAutomator() {
  const editor = document.getElementById('auto-editor');
  if (editor) G.automatorCode = editor.value;
  autoLines = G.automatorCode.split('\n');
  autoPC = 0;
  autoWaitUntil = 0;
  automatorRunning = true;
  autoConsole = [];
  autoVariables = {};
  autoLog('▶ Automator started', 'success');
  updateAutomatorStatus();
}

function stopAutomator() {
  automatorRunning = false;
  autoLog('■ Automator stopped', 'warn');
  updateAutomatorStatus();
}

function tickAutomator() {
  if (!automatorRunning || autoPC >= autoLines.length) {
    if (automatorRunning && autoPC >= autoLines.length) {
      autoPC = 0;
    }
    return;
  }
  
  if (Date.now() < autoWaitUntil) return;
  
  const line = autoLines[autoPC];
  const parsed = parseAutoLine(line);
  
  if (parsed && parsed.type === 'wait') {
    autoWaitUntil = Date.now() + parsed.ms;
    autoPC++;
    return;
  }
  
  if (parsed) {
    const cont = execCommand(parsed);
    if (!cont) return;
  }
  
  autoPC++;
}

function updateAutomatorStatus() {
  if (activeTab !== 'automator') return;
  const statusEl = document.getElementById('auto-status');
  if (statusEl) {
    statusEl.innerHTML = automatorRunning
      ? `<span class="status-pill status-on"><span class="pulse-dot"></span> Running (Line ${autoPC+1})</span>`
      : `<span class="status-pill status-off"><span class="pulse-dot"></span> Stopped</span>`;
  }
  const consoleEl = document.getElementById('auto-console');
  if (consoleEl) {
    consoleEl.innerHTML = autoConsole.slice(-50).map(l => 
      `<div class="log-${l.type}">[${new Date(l.time).toLocaleTimeString()}] ${l.msg}</div>`
    ).join('');
    consoleEl.scrollTop = consoleEl.scrollHeight;
  }
}

// ===== SAVE/LOAD =====
function saveGame() {
  const editor = document.getElementById('auto-editor');
  if (editor) G.automatorCode = editor.value;
  
  const s = {};
  for (let key in G) {
    if (G[key] instanceof Decimal) s[key] = G[key].toString();
    else if (typeof G[key] === 'object' && G[key] !== null && !(G[key] instanceof Decimal)) {
      s[key] = {};
      for (let k2 in G[key]) {
        if (G[key][k2] instanceof Decimal) s[key][k2] = G[key][k2].toString();
        else s[key][k2] = G[key][k2];
      }
    }
    else s[key] = G[key];
  }
  localStorage.setItem('hzSave', JSON.stringify(s));
}

// [FIX #4] Improved loadSaveData: only restore known ups keys
function loadSaveData(data) {
  try {
    const p = typeof data === 'string' ? JSON.parse(data) : data;
    G = makeDefaultState();
    for (let key in p) {
      if (key === 'achievements') {
        for (let k2 in p[key]) {
          G[key][k2] = p[key][k2];
        }
      } else if (key === 'ups') {
        for (let k2 in p[key]) {
          // Only restore keys that exist in current upgrade definitions
          if (G.ups.hasOwnProperty(k2)) {
            G.ups[k2] = D(p[key][k2]);
          }
        }
      } else if (key === 'theme' || key === 'automatorCode' ||
                 key === 'infinityDialogShown' || key === 'eternityDialogShown' ||
                 key === 'volumeUnlocked' || key === 'speakersUnlocked' ||
                 key === 'infinityUnlocked' || key === 'eternityUnlocked' ||
                 key === 'machinesUnlocked' || key === 'automatorUnlocked') {
        G[key] = p[key];
      } else if (typeof p[key] === 'string') {
        try { G[key] = D(p[key]); } catch(e) { /* skip unparseable */ }
      }
    }
    applyTheme(G.theme);
  } catch(e) { console.error('Load failed:', e); }
}

function loadGameFromInput() {
  loadSaveData(document.getElementById('save-input').value);
  document.getElementById('popup2').classList.remove('visible');
  showNotif('Loaded', 'Game loaded successfully!', 'success');
}

// [FIX #15] Added error handling for clipboard
function exportSave() {
  saveGame();
  const data = localStorage.getItem('hzSave');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(data).then(() => {
      showNotif('Copied', 'Save copied to clipboard!', 'success');
    }).catch(() => {
      // Fallback: select a temp textarea
      const ta = document.createElement('textarea');
      ta.value = data;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      ta.remove();
      showNotif('Copied', 'Save copied to clipboard!', 'success');
    });
  } else {
    const ta = document.createElement('textarea');
    ta.value = data;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    showNotif('Copied', 'Save copied to clipboard!', 'success');
  }
}

// ===== THEME BUTTONS =====
// [FIX #8] This is now called when opening theme popup too
function initThemeButtons() {
  const el = document.getElementById('theme-buttons');
  if (!el) return;
  el.innerHTML = THEMES.map(t =>
    `<div id="theme-${t}" class="theme-btn ${G.theme===t?'active':''}" style="background:linear-gradient(135deg,${THEME_COLORS[t]})" onclick="G.theme='${t}';applyTheme('${t}');initThemeButtons();document.getElementById('popup-theme').classList.remove('visible')"></div>`
  ).join('');
}

// ===== ACHIEVEMENTS =====
function checkAchievements() {
  ACHIEVEMENTS.forEach(a => {
    if (!G.achievements[a.id] && a.check()) {
      G.achievements[a.id] = true;
      showNotif('🏆 Achievement!', a.name, 'success');
    }
  });
}

// ===== PASSIVE GENERATION =====
function passiveTick(dt) {
  const il = (id) => getUpLevel('infinity', id);
  const el = (id) => getUpLevel('eternity', id);
  
  if (il(15).gt(0) && G.infinityUnlocked) {
    let gain = il(15).times(0.01).times(dt);
    if (el(12).gt(0)) gain = gain.times(Decimal.pow(1000, el(12)));
    G.infinity = G.infinity.plus(gain);
  }
  
  if (el(20).gt(0) && G.eternityUnlocked) {
    G.eternity = G.eternity.plus(el(20).times(0.001).times(dt));
  }
}

// ===== GAME LOOP =====
// [FIX #10] Delta-time based game loop
function gameLoop() {
  const now = Date.now();
  const elapsed = (now - lastTickTime) / 1000; // seconds since last tick
  lastTickTime = now;
  // Clamp delta to avoid huge jumps (e.g. after sleeping laptop for hours)
  const dt = Math.min(elapsed, 60); // max 60s catch-up per frame

  G.hz = G.hz.plus(calcHzPerSec().times(dt));
  passiveTick(dt);
  
  if (G.infinity.gte(D("1e80")) && !G.automatorUnlocked) {
    G.automatorUnlocked = true;
    showNotif('🤖 Unlocked!', 'Automator is now available!', 'special', 5000);
  }
  
  if (G.infinity.gte(1e6) && !G.machinesUnlocked) {
    G.machinesUnlocked = true;
  }
  
  if (G.hz.gte(G.infinityReq) && !G.infinityUnlocked) triggerInfinityDialog();
  if (G.infinity.gte(G.eternityReq) && !G.eternityUnlocked) triggerEternityDialog();
  
  checkAchievements();
  tickAutomator();
  render();
}

// ===== INIT =====
const savedData = localStorage.getItem('hzSave');
if (savedData) loadSaveData(savedData);
applyTheme(G.theme);
initThemeButtons();
render();

lastTickTime = Date.now();
setInterval(gameLoop, 1000 / 30);
setInterval(() => { saveGame(); }, 30000);
